<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOME</title>
<style>
  :root {
    --bg: #000000;
    --ink: #EDEDED;
    --dim: #6B6B6B;
    --faint: #2A2A2A;
    --red: #D71921;
    --dot-off: rgba(255,255,255,0.045);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, "SF Mono", "Cascadia Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    overflow: hidden;
    cursor: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body.preview { cursor: default; }

  /* ---------- layout ---------- */
  #stage {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 4.5vh 5vw;
    position: relative;
  }

  /* top bar */
  #topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    letter-spacing: 0.35em;
    font-size: clamp(11px, 1.2vw, 15px);
    color: var(--dim);
  }
  #datewrap { display: flex; align-items: center; gap: 0.9em; }
  #reddot {
    width: 0.62em; height: 0.62em;
    background: var(--red);
    border-radius: 50%;
    flex: none;
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  #weather { text-align: right; line-height: 1.9; }
  #weather .temp { color: var(--ink); }
  #weather .tag { font-size: 0.72em; color: var(--faint); letter-spacing: 0.3em; }

  /* clock */
  #clockzone {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 3.2vh;
  }
  #clock { line-height: 0; }
  #greeting {
    letter-spacing: 0.45em;
    font-size: clamp(10px, 1vw, 13px);
    color: var(--dim);
  }

  /* menu */
  #menu {
    display: flex;
    gap: 2.2vw;
    align-items: flex-end;
    padding-bottom: 1vh;
  }
  .tile {
    display: flex;
    flex-direction: column;
    gap: 1.6vh;
    padding: 0 0.2vw;
    opacity: 0.38;
    transition: opacity 200ms ease, transform 200ms ease;
    transform: translateY(0);
  }
  .tile .icon { height: clamp(26px, 3vw, 40px); }
  .tile .icon svg {
    height: 100%; width: auto; display: block;
    stroke: var(--ink); fill: none;
    stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round;
  }
  .tile .label {
    letter-spacing: 0.32em;
    font-size: clamp(10px, 1vw, 13px);
    color: var(--ink);
    white-space: nowrap;
  }
  .tile .dotlabel { display: none; line-height: 0; }
  .tile .marker {
    width: 0.45em; height: 0.45em;
    border-radius: 50%;
    background: transparent;
    margin-top: 0.2vh;
  }
  .tile.sel {
    opacity: 1;
    transform: translateY(-1.2vh);
  }
  .tile.sel .label { display: none; }
  .tile.sel .dotlabel { display: block; }
  .tile.sel .marker { background: var(--red); }

  /* footer hints */
  #hints {
    display: flex;
    gap: 3.5em;
    margin-top: 4vh;
    letter-spacing: 0.3em;
    font-size: clamp(9px, 0.85vw, 12px);
    color: var(--faint);
  }
  #hints b { color: var(--dim); font-weight: 400; }

  /* toast */
  #toast {
    position: absolute;
    left: 50%; bottom: 5vh;
    transform: translate(-50%, 200%);
    background: #0D0D0D;
    border: 1px solid #1F1F1F;
    padding: 1em 1.8em;
    letter-spacing: 0.3em;
    font-size: clamp(10px, 1vw, 13px);
    display: flex; align-items: center; gap: 1em;
    transition: transform 300ms cubic-bezier(.2,.9,.3,1);
    white-space: nowrap;
  }
  #toast.show { transform: translate(-50%, 0); }
  #toast .tdot { width: 0.55em; height: 0.55em; border-radius: 50%; background: var(--red); flex: none; }

  /* launch dim */
  #veil {
    position: fixed; inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 350ms ease;
  }
  #veil.on { opacity: 1; pointer-events: all; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div id="stage">
  <div id="topbar">
    <div id="datewrap"><span id="reddot"></span><span id="datetext">—</span></div>
    <div id="weather">
      <div class="temp" id="wtemp">··</div>
      <div id="wcond">CONNECTING</div>
      <div class="tag" id="wtag"></div>
    </div>
  </div>

  <div id="clockzone">
    <div id="clock"></div>
    <div id="greeting">—</div>
  </div>

  <div id="menu"></div>

  <div id="hints">
    <span><b>◂ ▸</b>&nbsp;&nbsp;NAVIGATE</span>
    <span><b>Ⓐ</b>&nbsp;&nbsp;OPEN</span>
    <span><b>HOLD ⌂</b>&nbsp;&nbsp;RETURN HOME</span>
  </div>
</div>

<div id="toast"><span class="tdot"></span><span id="toasttext"></span></div>
<div id="veil"></div>

<script>
/* =========================================================
   NOTHING-STYLE HTPC LAUNCHER
   Serves as both preview (browser/artifact) and production
   kiosk UI. In production, the backend at :8484 launches apps.
   ========================================================= */

const BACKEND = location.port === "8484" ? "" : "http://localhost:8484";
let previewMode = false;

/* ---------- 5x7 dot-matrix glyph engine ---------- */
const GLYPHS = {
  "0":["01110","10001","10011","10101","11001","10001","01110"],
  "1":["00100","01100","00100","00100","00100","00100","01110"],
  "2":["01110","10001","00001","00010","00100","01000","11111"],
  "3":["11111","00010","00100","00010","00001","10001","01110"],
  "4":["00010","00110","01010","10010","11111","00010","00010"],
  "5":["11111","10000","11110","00001","00001","10001","01110"],
  "6":["00110","01000","10000","11110","10001","10001","01110"],
  "7":["11111","00001","00010","00100","01000","01000","01000"],
  "8":["01110","10001","10001","01110","10001","10001","01110"],
  "9":["01110","10001","10001","01111","00001","00010","01100"],
  ":":["00000","00100","00100","00000","00100","00100","00000"],
  "A":["01110","10001","10001","11111","10001","10001","10001"],
  "B":["11110","10001","10001","11110","10001","10001","11110"],
  "C":["01110","10001","10000","10000","10000","10001","01110"],
  "D":["11100","10010","10001","10001","10001","10010","11100"],
  "E":["11111","10000","10000","11110","10000","10000","11111"],
  "F":["11111","10000","10000","11110","10000","10000","10000"],
  "G":["01110","10001","10000","10111","10001","10001","01111"],
  "H":["10001","10001","10001","11111","10001","10001","10001"],
  "I":["01110","00100","00100","00100","00100","00100","01110"],
  "J":["00111","00010","00010","00010","00010","10010","01100"],
  "K":["10001","10010","10100","11000","10100","10010","10001"],
  "L":["10000","10000","10000","10000","10000","10000","11111"],
  "M":["10001","11011","10101","10101","10001","10001","10001"],
  "N":["10001","11001","10101","10011","10001","10001","10001"],
  "O":["01110","10001","10001","10001","10001","10001","01110"],
  "P":["11110","10001","10001","11110","10000","10000","10000"],
  "Q":["01110","10001","10001","10001","10101","10010","01101"],
  "R":["11110","10001","10001","11110","10100","10010","10001"],
  "S":["01111","10000","10000","01110","00001","00001","11110"],
  "T":["11111","00100","00100","00100","00100","00100","00100"],
  "U":["10001","10001","10001","10001","10001","10001","01110"],
  "V":["10001","10001","10001","10001","10001","01010","00100"],
  "W":["10001","10001","10001","10101","10101","11011","10001"],
  "X":["10001","10001","01010","00100","01010","10001","10001"],
  "Y":["10001","10001","01010","00100","00100","00100","00100"],
  "Z":["11111","00001","00010","00100","01000","10000","11111"],
  "°":["01100","10010","10010","01100","00000","00000","00000"],
  " ":["00000","00000","00000","00000","00000","00000","00000"],
};

/* Render text as an SVG of round dots. Ghost dots (off) are
   faintly visible on the clock — the NDot matrix effect. */
function dotSVG(text, dotPx, opts = {}) {
  const gap = dotPx * (opts.gap ?? 0.55);
  const step = dotPx + gap;
  const charGap = step * (opts.charGap ?? 1.4);
  const ghost = opts.ghost ?? false;
  const color = opts.color ?? "var(--ink)";
  let x = 0;
  let dots = "";
  for (const raw of text.toUpperCase()) {
    const g = GLYPHS[raw] || GLYPHS[" "];
    for (let r = 0; r < 7; r++) {
      for (let c = 0; c < 5; c++) {
        const on = g[r][c] === "1";
        if (!on && !ghost) continue;
        const cx = x + c * step + dotPx / 2;
        const cy = r * step + dotPx / 2;
        dots += `<circle cx="${cx}" cy="${cy}" r="${dotPx/2}" fill="${on ? color : "var(--dot-off)"}"/>`;
      }
    }
    x += 5 * step + charGap;
  }
  const w = Math.max(1, x - charGap);
  const h = 7 * step - gap;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${dots}</svg>`;
}

/* ---------- clock ---------- */
const clockEl = document.getElementById("clock");
const dateEl = document.getElementById("datetext");
const greetEl = document.getElementById("greeting");
const DAYS = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
let lastClock = "";

function clockDotSize() {
  return Math.max(6, Math.round(Math.min(innerWidth * 0.019, innerHeight * 0.034)));
}
function drawClock(force) {
  const d = new Date();
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  const colon = d.getSeconds() % 2 === 0 ? ":" : " ";
  const face = hh + colon + mm;
  if (face === lastClock && !force) return;
  lastClock = face;
  clockEl.innerHTML = dotSVG(face, clockDotSize(), { ghost: true });
  dateEl.textContent = `${DAYS[d.getDay()]} · ${MONTHS[d.getMonth()]} ${String(d.getDate()).padStart(2,"0")}`;
  const h = d.getHours();
  greetEl.textContent = h < 5 ? "LATE NIGHT" : h < 12 ? "GOOD MORNING" : h < 18 ? "GOOD AFTERNOON" : "GOOD EVENING";
}
setInterval(drawClock, 1000);

/* ---------- weather (Open-Meteo, no key needed) ---------- */
const WMO = {
  0:"CLEAR", 1:"MOSTLY CLEAR", 2:"PARTLY CLOUDY", 3:"OVERCAST",
  45:"FOG", 48:"FOG", 51:"DRIZZLE", 53:"DRIZZLE", 55:"DRIZZLE",
  61:"LIGHT RAIN", 63:"RAIN", 65:"HEAVY RAIN", 66:"FREEZING RAIN", 67:"FREEZING RAIN",
  71:"LIGHT SNOW", 73:"SNOW", 75:"HEAVY SNOW", 77:"SNOW",
  80:"SHOWERS", 81:"SHOWERS", 82:"HEAVY SHOWERS",
  85:"SNOW SHOWERS", 86:"SNOW SHOWERS", 95:"THUNDERSTORM", 96:"THUNDERSTORM", 99:"THUNDERSTORM",
};
async function loadWeather() {
  // Coordinates come from backend config in production; fall back to defaults.
  let lat = 41.117, lon = 20.802; // change in server/config.json
  try {
    const cfg = await fetch(BACKEND + "/config", { signal: AbortSignal.timeout(2500) }).then(r => r.json());
    if (cfg.weather) { lat = cfg.weather.lat; lon = cfg.weather.lon; }
  } catch (_) {}
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`;
    const j = await fetch(url, { signal: AbortSignal.timeout(4000) }).then(r => r.json());
    const t = Math.round(j.current.temperature_2m);
    document.getElementById("wtemp").innerHTML = dotSVG(`${t}°`, Math.max(3, Math.round(innerWidth*0.004)));
    document.getElementById("wcond").textContent = WMO[j.current.weather_code] || "—";
    document.getElementById("wtag").textContent = "";
  } catch (_) {
    // Preview / offline fallback
    document.getElementById("wtemp").innerHTML = dotSVG("24°", Math.max(3, Math.round(innerWidth*0.004)));
    document.getElementById("wcond").textContent = "PARTLY CLOUDY";
    document.getElementById("wtag").textContent = "DEMO DATA";
  }
}
setInterval(loadWeather, 15 * 60 * 1000);

/* ---------- menu ---------- */
const ICONS = {
  streaming: '<svg viewBox="0 0 40 40"><rect x="4" y="8" width="32" height="22" rx="1"/><path d="M17 14v10l9-5z"/><path d="M13 35h14"/></svg>',
  livetv:    '<svg viewBox="0 0 40 40"><rect x="4" y="12" width="32" height="22" rx="1"/><path d="M13 12 20 5l7 7"/><circle cx="30" cy="18" r="1.4" fill="currentColor"/></svg>',
  music:     '<svg viewBox="0 0 40 40"><path d="M14 30V9l18-3v20"/><circle cx="10" cy="30" r="4"/><circle cx="28" cy="26" r="4"/></svg>',
  gaming:    '<svg viewBox="0 0 40 40"><path d="M9 26c-3 0-5-9 0-11 4-1.6 18-1.6 22 0 5 2 3 11 0 11-3 0-4-4-7-4h-8c-3 0-4 4-7 4z"/><path d="M13 19v4M11 21h4"/><circle cx="28" cy="20" r="1.3" fill="currentColor"/><circle cx="31" cy="23" r="1.3" fill="currentColor"/></svg>',
  apps:      '<svg viewBox="0 0 40 40"><rect x="6" y="6" width="11" height="11"/><rect x="23" y="6" width="11" height="11"/><rect x="6" y="23" width="11" height="11"/><rect x="23" y="23" width="11" height="11"/></svg>',
  settings:  '<svg viewBox="0 0 40 40"><path d="M6 12h20M32 12h2M6 28h8M20 28h14"/><circle cx="28" cy="12" r="3.5"/><circle cx="16" cy="28" r="3.5"/></svg>',
};
const FALLBACK_APPS = [
  { id: "streaming", label: "STREAMING" },
  { id: "livetv",    label: "LIVE TV" },
  { id: "music",     label: "MUSIC" },
  { id: "gaming",    label: "GAMING" },
  { id: "apps",      label: "APPS" },
  { id: "settings",  label: "SETTINGS" },
];
let APPS = FALLBACK_APPS;
let sel = 0;
const menuEl = document.getElementById("menu");

function buildMenu() {
  menuEl.innerHTML = "";
  APPS.forEach((app, i) => {
    const t = document.createElement("div");
    t.className = "tile" + (i === sel ? " sel" : "");
    t.innerHTML = `
      <div class="icon">${ICONS[app.id] || ICONS.apps}</div>
      <div class="label">${app.label}</div>
      <div class="dotlabel">${dotSVG(app.label, Math.max(2.4, innerWidth*0.0028), {charGap:1.1})}</div>
      <div class="marker"></div>`;
    t.addEventListener("click", () => { sel = i; refreshSel(); launch(); });
    menuEl.appendChild(t);
  });
}
function refreshSel() {
  [...menuEl.children].forEach((t, i) => t.classList.toggle("sel", i === sel));
}
function move(dir) {
  sel = (sel + dir + APPS.length) % APPS.length;
  refreshSel();
}

/* ---------- launching ---------- */
const toast = document.getElementById("toast");
const toastText = document.getElementById("toasttext");
let toastTimer;
function showToast(msg, ms = 2200) {
  toastText.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), ms);
}
async function launch() {
  const app = APPS[sel];
  if (previewMode) {
    showToast(`PREVIEW · WOULD LAUNCH ${app.label}`);
    return;
  }
  document.getElementById("veil").classList.add("on");
  try {
    await fetch(`${BACKEND}/launch/${app.id}`, { method: "POST" });
    showToast(`OPENING ${app.label}`);
  } catch (_) {
    showToast(`BACKEND OFFLINE · CHECK SERVER`);
  }
  setTimeout(() => document.getElementById("veil").classList.remove("on"), 4000);
}

/* Ask backend for the real app list; if unreachable, run in preview mode. */
async function loadApps() {
  try {
    const cfg = await fetch(BACKEND + "/config", { signal: AbortSignal.timeout(2500) }).then(r => r.json());
    if (Array.isArray(cfg.apps) && cfg.apps.length) APPS = cfg.apps;
  } catch (_) {
    previewMode = true;
    document.body.classList.add("preview");
  }
  buildMenu();
}

/* ---------- input: keyboard ---------- */
addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") move(1);
  else if (e.key === "ArrowLeft") move(-1);
  else if (e.key === "Enter") launch();
});

/* ---------- input: gamepad ---------- */
const pad = { left: false, right: false, a: false };
function pollPads() {
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  for (const gp of gps) {
    if (!gp) continue;
    const ax = gp.axes[0] || 0;
    const left  = (gp.buttons[14] && gp.buttons[14].pressed) || ax < -0.5;
    const right = (gp.buttons[15] && gp.buttons[15].pressed) || ax > 0.5;
    const a     = gp.buttons[0] && gp.buttons[0].pressed;
    if (left && !pad.left) move(-1);
    if (right && !pad.right) move(1);
    if (a && !pad.a) launch();
    pad.left = left; pad.right = right; pad.a = a;
    break;
  }
  requestAnimationFrame(pollPads);
}
addEventListener("gamepadconnected", () => showToast("CONTROLLER CONNECTED"));

/* ---------- boot ---------- */
addEventListener("resize", () => { drawClock(true); buildMenu(); });
drawClock(true);
loadWeather();
loadApps();
pollPads();
</script>
</body>
</html>
