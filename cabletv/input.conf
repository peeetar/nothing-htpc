# cabletv input.conf — replaces ALL default mpv bindings.
# A real cable box has ~15 buttons; so does this.

# --- gamepad (mpv --input-gamepad, SDL names / xbox layout) ---
GAMEPAD_RIGHT_SHOULDER  script-binding cabletv/ch-up
GAMEPAD_LEFT_SHOULDER   script-binding cabletv/ch-down
GAMEPAD_ACTION_LEFT     script-binding cabletv/keypad
GAMEPAD_ACTION_DOWN     script-binding cabletv/select
GAMEPAD_ACTION_RIGHT    script-binding cabletv/back
GAMEPAD_DPAD_UP         script-binding cabletv/nav-up
GAMEPAD_DPAD_DOWN       script-binding cabletv/nav-down
GAMEPAD_DPAD_LEFT       script-binding cabletv/nav-left
GAMEPAD_DPAD_RIGHT      script-binding cabletv/nav-right

# --- keyboard (VM testing / debugging) ---
UP        script-binding cabletv/nav-up
DOWN      script-binding cabletv/nav-down
LEFT      script-binding cabletv/nav-left
RIGHT     script-binding cabletv/nav-right
PGUP      script-binding cabletv/ch-up
PGDWN     script-binding cabletv/ch-down
x         script-binding cabletv/keypad
ENTER     script-binding cabletv/select
ESC       script-binding cabletv/back
t         script-binding cabletv/guide
0 script-binding cabletv/digit-0
1 script-binding cabletv/digit-1
2 script-binding cabletv/digit-2
3 script-binding cabletv/digit-3
4 script-binding cabletv/digit-4
5 script-binding cabletv/digit-5
6 script-binding cabletv/digit-6
7 script-binding cabletv/digit-7
8 script-binding cabletv/digit-8
9 script-binding cabletv/digit-9

# emergency exit (launcher home-button is the normal way out)
ctrl+q    quit
